name: "Application Pipeline"

on:
  push:
  workflow_dispatch:
    inputs:
      target_sub_env:
        description: 'Environnement cible secondaire'
        required: true
        default: 'sandbox'
  schedule:
    - cron: '0 0 * * *'

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read # Permet de cloner le code source
  checks: write # Permet d'écrire le rapport JUnit
  security-events: write # Permet d'envoyer les alertes CodeQL à l'onglet Security
  actions: read # Permet à CodeQL de lire les métadonnées du run
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: "Clonage du depot"
        uses: actions/checkout@v5

      - name: "Configuration du Cache npm"
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: "Installation propre des dependances"
        run: |
          echo "::group::Installation des modules Node.js"
          npm ci
          echo "::endgroup::"

      - name: "Initialisation de CodeQL Analysis"
        uses: github/codeql-action/init@v4
        with:
          languages: 'javascript'

      - name: "Execution de la suite de tests"
        run: npm test

      - name: "Execution de CodeQL Analysis"
        uses: github/codeql-action/analyze@v4

      - name: "Publication du Rapport de Tests"
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: '**/junit.xml'

  deploy-production:
    needs: build-and-test
    environment: production
    runs-on: ubuntu-latest
    steps:
      - name: "Clonage du depot"
        uses: actions/checkout@v5

      - name: "Installation des outils de chiffrement"
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y age curl
          sudo curl -fsSL -o /usr/local/bin/sops https://github.com/getsops/sops/releases/download/v3.13.1/sops-v3.13.1.linux.amd64
          sudo chmod +x /usr/local/bin/sops
          age-keygen --version
          sops --version

      - name: "Installation propre des dependances"
        run: npm ci

      - name: "Dechiffrement a la volee de la configuration de production"
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          set -euo pipefail
          umask 077
          printf '%s' "$SOPS_AGE_KEY" > "$RUNNER_TEMP/ops.txt"
          SOPS_AGE_KEY_FILE="$RUNNER_TEMP/ops.txt" sops -d --output-type json secrets-prod.yaml > "$RUNNER_TEMP/secrets-prod.json"
          node - <<'NODE'
          const fs = require('fs');
          const secretPath = `${process.env.RUNNER_TEMP}/secrets-prod.json`;
          const secret = JSON.parse(fs.readFileSync(secretPath, 'utf8'));
          const envFile = process.env.GITHUB_ENV;
          fs.appendFileSync(envFile, `SIMULATED_AWS_KEY=${secret.SIMULATED_AWS_KEY}\n`);
          NODE
          rm -f "$RUNNER_TEMP/ops.txt" "$RUNNER_TEMP/secrets-prod.json"

      - name: "Demarrage hermetique et validation"
        run: |
          set -euo pipefail
          npm start > "$RUNNER_TEMP/app.log" 2>&1 &
          app_pid=$!
          trap 'kill "$app_pid" >/dev/null 2>&1 || true' EXIT

          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3000/api/health >/dev/null; then
              echo "Validation de l'application reussie."
              break
            fi
            sleep 1
          done

          curl -fsS http://127.0.0.1:3000/api/health >/dev/null
          echo "Deploiement effectue avec succes sur l'environnement officiel."
          echo "Sous-environnement selectionne manuellement : ${{ github.event.inputs.target_sub_env }}"